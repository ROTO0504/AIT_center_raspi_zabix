name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: raspi
    steps:
      - name: 本番ディレクトリを最新コミットに更新
        run: |
          set -euxo pipefail
          cd /home/raspi/Desktop/Mail2AlertLight
          git fetch AIT-center-mac
          git reset --hard AIT-center-mac/main
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python -m py_compile start_system.py env_loader.py settings.py utils.py graph_client.py monitor_service.py web_app.py web_dev.py gpio_test.py test_mail_scenarios.py
          .venv/bin/python test_mail_scenarios.py startup_empty
          .venv/bin/python test_mail_scenarios.py high_problem
          .venv/bin/python test_mail_scenarios.py warning_while_high
          .venv/bin/python test_mail_scenarios.py repeated_problem_duration
          .venv/bin/python test_mail_scenarios.py high_then_button
          sudo systemctl restart mail2alertlight
          sudo systemctl is-active mail2alertlight
